# Premium dark theme for the operator dashboard.
# Visual styling only (colors / font / sizes) — no layout or component changes.
[theme]
base = "dark"
primaryColor = "#7c5cff"            # refined indigo-violet accent
backgroundColor = "#080a0f"         # near-black / OLED base
secondaryBackgroundColor = "#14171f" # elevated surface: sidebar, inputs, cards
textColor = "#eef1f7"               # soft off-white
linkColor = "#9b8cff"
borderColor = "#23262f"
font = "sans serif"
headingFont = "sans serif"
baseFontSize = 16
