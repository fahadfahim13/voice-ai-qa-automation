# Premium dark theme for the operator dashboard.
# Visual styling only (colors / font / sizes) — no layout or component changes.
[theme]
base = "dark"
primaryColor = "#7c5cff"            # refined indigo-violet accent
backgroundColor = "#0e1117"         # deep midnight base
secondaryBackgroundColor = "#171c28" # elevated surface: sidebar, inputs, cards
textColor = "#e6e9f0"               # soft off-white
linkColor = "#9b8cff"
borderColor = "#262c3a"
font = "sans serif"
headingFont = "sans serif"
baseFontSize = 16
